<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドリンク売上トラッカー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--surface3:#e8e6de;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#1a1917;--text2:#6b6960;--text3:#9e9d96;
  --blue:#3b6bde;--green:#2a9e55;--amber:#d97706;--red:#dc2626;
  --r:8px;--r-lg:14px;
}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
#root{max-width:760px;margin:0 auto;padding:20px 14px 80px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:16px 20px;margin-bottom:10px}
.card-sm{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px}
.lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:4px}
input,select{width:100%;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none}
input:focus,select:focus{border-color:var(--text)}
button{padding:8px 14px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .1s}
button:hover{background:var(--surface2)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text);width:100%;justify-content:center;padding:11px;font-size:14px;font-weight:600;border-radius:var(--r-lg)}
.btn-primary:hover{background:#333}
.btn-primary:disabled{background:var(--text3);border-color:var(--text3)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.row{display:flex;align-items:center;gap:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--r-lg);padding:24px;text-align:center;cursor:pointer;background:var(--surface2)}
.upload-zone:hover{border-color:var(--blue);background:#eff3ff}
.metric-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.metric-val{font-size:16px;font-weight:700;letter-spacing:-0.02em;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.metric-lbl{font-size:10px;color:var(--text2)}
.nav-tabs{display:flex;gap:3px;background:#ece9e0;border-radius:12px;padding:3px;margin-bottom:16px}
.nav-tab{flex:1;border:none;border-radius:9px;padding:8px 4px;font-size:12px;font-weight:400;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:inherit}
.nav-tab.active{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.api-bar{background:#fffbeb;border:0.5px solid #fcd34d;border-radius:var(--r-lg);padding:12px 16px;margin-bottom:12px}
.receipt-img{width:100%;border-radius:var(--r);border:0.5px solid var(--border);max-height:200px;object-fit:contain;background:#f9f9f7;display:block;margin-bottom:10px}
.seg-ctrl{display:flex;background:var(--surface2);border-radius:var(--r);padding:2px;gap:2px}
.seg-btn{flex:1;border:none;border-radius:6px;padding:5px 6px;font-size:11px;font-weight:400;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.seg-btn.active{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.07)}
.scroll-x{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 8px;color:var(--text3);font-weight:500;border-bottom:0.5px solid var(--border2);white-space:nowrap}
td{padding:8px 8px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
.empty{text-align:center;padding:32px 16px;color:var(--text2)}
.empty i{font-size:32px;display:block;margin-bottom:8px;color:var(--text3)}
/* SVG Chart */
.chart-wrap{position:relative;width:100%;overflow:hidden}
.bar-tooltip{position:absolute;background:rgba(26,25,23,.85);color:#fff;font-size:11px;padding:4px 8px;border-radius:5px;pointer-events:none;white-space:nowrap;transform:translateX(-50%);z-index:10}
/* Goal */
.goal-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:12px;font-size:13px}
.goal-bar input{width:88px;padding:3px 6px;border:0.5px solid var(--border2);border-radius:6px;font-size:13px;text-align:right}
.achievement-banner{padding:14px;border-radius:var(--r);border:0.5px solid;margin-bottom:12px}
.achievement-progress{height:8px;border-radius:4px;background:var(--border);margin:6px 0;overflow:hidden}
.achievement-progress-fill{height:100%;border-radius:4px;transition:width .3s}
.metric-sub{font-size:10px;margin-top:3px}
</style>
</head>

/* ── PDF.js テキスト抽出 ── */
async function loadPDFJS(){
  if(window.pdfjsLib)return;
  await new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc=
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

async function extractPDFText(b64){
  await loadPDFJS();
  const bin=atob(b64),bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const pdf=await pdfjsLib.getDocument({data:bytes.buffer}).promise;
  let text='';
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const viewport=page.getViewport({scale:1});
    const midX=viewport.width/2;
    const content=await page.getTextContent();
    /* 左右カラムに分離してからY座標でグループ化 */
    const processCol=items=>{
      const groups=[];
      for(const item of items){
        const y=item.transform[5],x=item.transform[4];
        const g=groups.find(g=>Math.abs(g.y-y)<=3);
        if(g)g.items.push({x,str:item.str});
        else groups.push({y,items:[{x,str:item.str}]});
      }
      groups.sort((a,b)=>b.y-a.y);
      return groups.map(g=>{
        g.items.sort((a,b)=>a.x-b.x);
        return g.items.map(i=>i.str).join('');
      }).filter(l=>l.trim()).join('\n');
    };
    const left=content.items.filter(i=>i.transform[4]<midX);
    const right=content.items.filter(i=>i.transform[4]>=midX);
    text+=processCol(left)+'\n'+processCol(right)+'\n--- PAGE BREAK ---\n';
  }
  /* NFKC正規化：康熙部首(⽇⼈⼋等)→通常漢字(日人八等)に変換 */
  return text.normalize('NFKC');
}

/* ── 伝票ジャーナル ルールベースパーサー ── */
function parseJournalText(text,masterDrinks=[],masterExcludes=[]){
  /* 全日付の出現位置を収集 */
  const dateChanges=[];
  const dateRe=/営業日付[：:\s]*(\d{4})年\s*(\d{1,2})月\s*(\d{1,2})日/g;
  let dm;
  while((dm=dateRe.exec(text))!==null){
    const d=`${dm[1]}-${String(dm[2]).padStart(2,'0')}-${String(dm[3]).padStart(2,'0')}`;
    if(!dateChanges.length||dateChanges[dateChanges.length-1].date!==d)
      dateChanges.push({date:d,index:dm.index});
  }
  if(!dateChanges.length)return null;

  /* 伝票ブロックのインデックスを収集 */
  const ticketRe=/.\s*伝票\s*No[.\．]/g;
  const ticketIdxs=[];
  let tm2;
  while((tm2=ticketRe.exec(text))!==null)ticketIdxs.push(tm2.index);
  if(!ticketIdxs.length)return null;

  /* 各伝票ブロックの日付を特定（直前の営業日付を使用） */
  const getDate=idx=>{
    let d=dateChanges[0].date;
    for(const dc of dateChanges){if(dc.index<=idx)d=dc.date;else break;}
    return d;
  };

  /* ドリンク判定 */
  const DRINK_KW=['ビール','ワイン','日本酒','焼酎','カクテル','ハイボール','サワー','ウーロン','ジュース','コーラ','コーヒー','お茶','緑茶','スパークリング','シャンパン','梅酒','リキュール','紹興酒','ウイスキー','ブランデー','ミネラルウォーター','ソフトドリンク','ノンアルコール','レモン水','水','泡盛'];
  const FOOD_KW=['コース','ランチ','ディナー','フード','料理','サービス料','チャージ'];
  const norm=s=>s.replace(/\s/g,'');
  const isDrink=name=>{
    if(!name)return false;
    const n=norm(name);
    if(masterExcludes.some(e=>n.includes(norm(e))))return false;
    if(masterDrinks.some(d=>{const dn=norm(d);return n.includes(dn)||dn.includes(n);}))return true;
    if(FOOD_KW.some(k=>n.includes(k)))return false;
    if(DRINK_KW.some(k=>n.includes(k)))return true;
    return false;
  };

  /* 伝票ブロックを処理（インデックスベースで日付を追跡） */
  const allTables=[];
  for(let bi=0;bi<ticketIdxs.length;bi++){
    const start=ticketIdxs[bi];
    const end=ticketIdxs[bi+1]??text.length;
    const block=text.slice(start,end);
    const blockDate=getDate(start);
    if(!block.includes('会計済'))continue;

    const seatM=block.match(/テーブル[：:\s]*([^\s　]+)[\s　]+人数[：:\s]*(\d+)/);
    if(!seatM)continue;
    const seat=seatM[1].replace(/[：:]/g,'');
    const covers=parseInt(seatM[2])||0;

    const timeM=block.match(/退店時間[：:\s]*(\d{1,2}:\d{2})/);
    const time=timeM?timeM[1].padStart(5,'0'):'';

    /* 品目解析 */
    const lines=block.split('\n').map(l=>l.trim()).filter(Boolean);
    const drinks=[];
    let drinkTotal=0,foodTotal=0,lastItem='';
    const SKIP_RE=/^(合計|小計|税|サービス|現金|クレジット|電子|お預かり|おつり|品名|数量|金額|点数|登録|事業|状態|POS|入店|退店|テーブル|店舗|営業|担当|---|※|2店舗|端数)/;
    const addItem=(name,qty,unitPrice,subtotal)=>{
      if(!name||subtotal<=0)return;
      if(isDrink(name)){drinks.push({name,qty,unitPrice,subtotal});drinkTotal+=subtotal;}
      else{foodTotal+=subtotal;}
    };
    for(const line of lines){
      if(SKIP_RE.test(line))continue;
      if(/^[\d¥￥,\s\-\.\/%×x×]+$/.test(line))continue;
      /* 1行フォーマット: 品名 ... 単価×数量 ... 小計 */
      const sl=line.match(/^(.+?)\s{2,}(\d[\d,]*)\s*[×x×Xx]\s*(\d+)\s*[¥￥]?\s*([\d,]+)$/);
      if(sl){
        const iname=sl[1].trim();
        if(iname&&!SKIP_RE.test(iname))
          addItem(iname,parseInt(sl[3]),parseInt(sl[2].replace(/,/g,'')),parseInt(sl[4].replace(/,/g,'')));
        lastItem='';continue;
      }
      /* 2行フォーマット: 単価×数量 ¥小計（前行が品名） */
      const pm=line.match(/^([\d,]+)\s*[×x×Xx]\s*(\d+)\s*[¥￥\\]?\s*([\d,]+)/);
      if(pm){
        if(lastItem)addItem(lastItem,parseInt(pm[2]),parseInt(pm[1].replace(/,/g,'')),parseInt(pm[3].replace(/,/g,'')));
        lastItem='';continue;
      }
      /* 品名行（次の価格行まで保持） */
      if(line.length<=50)lastItem=line;
    }


    /* 税抜合計（1テーブルとして非現実的な金額はdrinkTotal+foodTotalで代替） */
    const MAX_PER_TABLE=500000;
    const totalM=block.match(/税抜合計[\s　]*[¥￥\\]?\s*([\d,]+)/);
    const totalRaw=totalM?parseInt(totalM[1].replace(/,/g,'')):0;
    const total=totalRaw>0&&totalRaw<=MAX_PER_TABLE?totalRaw:(drinkTotal+foodTotal);

    /* コース名（店舗名・ヘッダー行は除外） */
    const COURSE_KW=['コース','ランチ','ディナー','フード'];
    const COURSE_SKIP=/^(合計|小計|税|サービス|登録|事業|店舗|営業|担当|POS|テーブル|入店|退店|状態|品名|数量|金額)/;
    const courseLine=lines.find(l=>COURSE_KW.some(k=>l.includes(k))&&!COURSE_SKIP.test(l));
    const course=courseLine||'';

    /* covers=0は人数不明として除外 */
    if(covers===0)continue;
    if(total>0||drinkTotal>0){
      allTables.push({date:blockDate,time,seat,covers,course,drinks,drinkTotal,foodTotal,total,
        drinkPerCover:covers>0?drinkTotal/covers:0,
        drinksPerCover:covers>0?drinks.reduce((s,d)=>s+d.qty,0)/covers:0});
    }
  }

  if(!allTables.length)return null;

  /* 日付ごとにグループ化して日次レコードを生成 */
  const dateMap={};
  for(const t of allTables){
    if(!dateMap[t.date])dateMap[t.date]=[];
    dateMap[t.date].push(t);
  }
  const isLunch=t=>t.time>='10:00'&&t.time<'17:00';
  return Object.entries(dateMap).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,tables])=>{
    const totalSales=tables.reduce((s,t)=>s+t.total,0);
    const drinkSales=tables.reduce((s,t)=>s+t.drinkTotal,0);
    const totalCovers=tables.reduce((s,t)=>s+t.covers,0);
    const drinkCount=tables.reduce((s,t)=>s+t.drinks.reduce((ss,d)=>ss+d.qty,0),0);
    const lT=tables.filter(isLunch),dT=tables.filter(t=>!isLunch(t));
    return{date,totalSales,drinkSales,foodSales:totalSales-drinkSales,
      totalCovers,drinkCount,tableCount:tables.length,
      lunchCovers:lT.reduce((s,t)=>s+t.covers,0),dinnerCovers:dT.reduce((s,t)=>s+t.covers,0),
      lunchDrinkSales:lT.reduce((s,t)=>s+t.drinkTotal,0),dinnerDrinkSales:dT.reduce((s,t)=>s+t.drinkTotal,0),
      drinkPerCover:totalCovers>0?drinkSales/totalCovers:0,
      drinkRatio:totalSales>0?drinkSales/totalSales:0,
      notes:'',tables};
  });
}

async function callVision(apiKey,b64,mime,prompt,maxTokens=2000){
  const gasUrl=localStorage.getItem(GAS_URL_KEY)||DEFAULT_GAS_URL;

  /* ── GAS経由（スタッフはAPIキー不要） ── */
  if(gasUrl){
    const res=await fetch(gasUrl,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({type:'analyze',image:b64||null,mime:mime||null,prompt,maxTokens})
    });
    if(!res.ok)throw new Error('GAS接続エラー: '+res.status);
    const data=await res.json();
    if(!data.success)throw new Error(data.error||'GAS解析失敗');
    return data.text;
  }

  /* ── フォールバック：直接API呼び出し（APIキーが必要） ── */
  if(!apiKey)throw new Error('APIキーが設定されていません（設定タブから入力）');
  const content=[];
  if(b64){
    content.push(mime==='application/pdf'
      ?{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}}
      :{type:'image',source:{type:'base64',media_type:mime,data:b64}});
  }
  content.push({type:'text',text:prompt});
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:MODEL,max_tokens:maxTokens,messages:[{role:'user',content}]})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.content[0].text;
}
function toB64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('読み込み失敗'));
    r.readAsDataURL(file);
  });
}
/* 画像をリサイズ圧縮してBase64を返す（APIの5MB制限対策） */
async function compressImage(file,maxPx=1600){
  if(file.type==='application/pdf'){
    const b64=await toB64(file);
    return{b64,mime:'application/pdf'};
  }
  return new Promise((res,rej)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      try{
        const s=Math.min(1,maxPx/Math.max(img.width,img.height,1));
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        URL.revokeObjectURL(url);
        c.toBlob(blob=>{
          if(!blob)return rej(new Error('圧縮失敗'));
          const r=new FileReader();
          r.onload=e=>res({b64:e.target.result.split(',')[1],mime:'image/jpeg'});
          r.onerror=()=>rej(new Error('読み込み失敗'));
          r.readAsDataURL(blob);
        },'image/jpeg',0.85);
      }catch(e){rej(e);}
    };
    img.onerror=()=>rej(new Error('画像読み込み失敗'));
    img.src=url;
  });
}

/* ── Simple Bar Chart (pure SVG, no deps) ── */
function BarChart({data,valueKey,labelKey,color='#3b6bde',height=180,goalValue}){
  const [tip,setTip]=useState(null);
  if(!data||!data.length)return null;
  const vals=data.map(d=>parseFloat(d[valueKey])||0);
  const max=Math.max(...vals,goalValue||0)||1;
  const W=600,H=height,PL=10,PR=28,PT=10,PB=32;
  const chartW=W-PL-PR;
  const barW=Math.max(8,chartW/data.length*0.6);
  const gap=chartW/data.length;
  const goalY=goalValue&&goalValue<=max?PT+(H-PT-PB)*(1-goalValue/max):null;
  return React.createElement('div',{className:'chart-wrap',style:{height:H+40}},
    React.createElement('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:'100%',height:H}},
      React.createElement('line',{x1:PL,y1:PT,x2:PL,y2:H-PB,stroke:'#e5e5e0',strokeWidth:1}),
      React.createElement('line',{x1:PL,y1:H-PB,x2:W-PR,y2:H-PB,stroke:'#e5e5e0',strokeWidth:1}),
      [0.25,0.5,0.75,1].map(r=>{
        const y=PT+(H-PT-PB)*(1-r);
        return React.createElement('g',{key:r},
          React.createElement('line',{x1:PL,y1:y,x2:W-PR,y2:y,stroke:'#f0efe9',strokeWidth:1}),
          React.createElement('text',{x:PL-2,y:y+3,textAnchor:'end',fontSize:8,fill:'#9e9d96'},`¥${fmt(max*r,0)}`)
        );
      }),
      data.map((d,i)=>{
        const v=vals[i];
        const bh=(v/max)*(H-PT-PB);
        const x=PL+i*gap+gap/2;
        const y=H-PB-bh;
        return React.createElement('g',{key:i,style:{cursor:'pointer'},
          onMouseEnter:e=>setTip({i,x,v,label:d[labelKey]}),
          onMouseLeave:()=>setTip(null)
        },
          React.createElement('rect',{x:x-barW/2,y,width:barW,height:bh,fill:tip&&tip.i===i?'#2050c0':color,rx:3}),
          React.createElement('text',{x,y:H-PB+14,textAnchor:'middle',fontSize:9,fill:'#9e9d96'},d[labelKey])
        );
      }),
      goalY!=null&&React.createElement('g',null,
        React.createElement('line',{x1:PL,y1:goalY,x2:W-PR,y2:goalY,stroke:'#ef4444',strokeWidth:1.5,strokeDasharray:'5,3'}),
        React.createElement('text',{x:W-PR+3,y:goalY+3,fontSize:8,fill:'#ef4444',fontWeight:600},'目標')
      )
    ),
    tip&&React.createElement('div',{className:'bar-tooltip',style:{top:10,left:`${(tip.x/W)*100}%`}},
      `${tip.label}: ¥${fmt(tip.v,0)}`
    )
  );
}

/* ── Reports ── */
function Reports({data,setData,goal,config}){
  const netFactor=1/((1+((config&&config.taxRate)||0)/100)*(1+((config&&config.serviceRate)||0)/100));
  const net=v=>Math.round((v||0)*netFactor);
  const [period,setPeriod]=useState('weekly');
  const [rs,setRs]=useState('');
  const [re,setRe]=useState('');
  const [weekOffset,setWeekOffset]=useState(0); /* 0=今週, -1=先週, … */
  const [expandedSeat,setExpandedSeat]=useState(null);
  const fmtD=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const [selDay,setSelDay]=useState(()=>{const d=new Date();d.setDate(d.getDate()-1);return fmtD(d);});

  /* Zレポートのない日のテーブルデータから「仮の日次レコード」を生成 */
  const tableDays=useMemo(()=>{
    const zDates=new Set((data.days||[]).map(d=>d.date));
    const map={};
    (data.tables||[]).forEach(t=>{
      if(zDates.has(t.date))return; /* Zレポートがある日はスキップ */
      if(!map[t.date])map[t.date]=[];
      map[t.date].push(t);
    });
    return Object.entries(map).map(([date,tables])=>{
      const totalSales=tables.reduce((s,t)=>s+(t.total||0),0);

      React.createElement('div',{style:{fontSize:11,color:'var(--text3)',marginBottom:8,textAlign:'center'}},

/* ── Master Settings ── */
function MasterSettings({apiKey,config,setConfig}){
  const [master,setMasterState]=useState(loadMaster);
  const [candidates,setCandidates]=useState([]);   // AI分類用 [{name,isDrink}]
  const [structured,setStructured]=useState(null); // 構造化CSV用 {drinks,totalQty,totalAmt}
  const [phase,setPhase]=useState('list'); // 'list'|'loading'|'confirm'|'confirm-structured'
  const [err,setErr]=useState('');
  const [newName,setNewName]=useState('');
  const [newSeat,setNewSeat]=useState('');
  const [fileName,setFileName]=useState('');

  const persist=m=>{saveMaster(m);setMasterState(m)};
  const removeDrink=name=>persist({...master,drinks:master.drinks.filter(d=>d!==name)});
  const removeExclude=name=>persist({...master,excludes:(master.excludes||[]).filter(d=>d!==name)});
  const addManual=()=>{
    const n=newName.trim();
    if(!n||master.drinks.includes(n))return;
    persist({...master,drinks:[...master.drinks,n]});
    setNewName('');
  };

  /* ── 構造化CSV（カテゴリ1列あり）パース ── */
  const parseStructuredCSV=text=>{
    const sep=text.includes('\t')?'\t':',';
    const rows=text.trim().split(/\r?\n/).map(l=>l.split(sep).map(c=>c.replace(/^"|"$/g,'').trim()));
    const hdr=rows[0];
    const nameIdx=hdr.findIndex(h=>h==='商品名');
    const cat1Idx=hdr.findIndex(h=>h==='カテゴリ1');
    const cat2Idx=hdr.findIndex(h=>h==='カテゴリ2');
    const qtyIdx =hdr.findIndex(h=>h==='売上数量');
    const amtIdx =hdr.findIndex(h=>h==='売上金額');
    if(cat1Idx<0||nameIdx<0)return null;
    const pn=s=>parseInt((s||'').replace(/[¥,\s]/g,'')||'0')||0;
    const drinks=rows.slice(1)
      .filter(r=>r[cat1Idx]==='ドリンク'&&r[nameIdx])
      .map(r=>({name:r[nameIdx],cat2:cat2Idx>=0?r[cat2Idx]:'',qty:qtyIdx>=0?pn(r[qtyIdx]):0,amt:amtIdx>=0?pn(r[amtIdx]):0}));
    const excludes=[...new Set(rows.slice(1)
      .filter(r=>r[nameIdx]&&(r[cat1Idx]==='コース'||r[cat1Idx]==='フード'))
      .map(r=>r[nameIdx]))];
    return{drinks,excludes,totalQty:drinks.reduce((s,d)=>s+d.qty,0),totalAmt:drinks.reduce((s,d)=>s+d.amt,0)};
  };

  /* ── 非構造化CSV → 品名抽出（AI分類用） ── */
  const parseNames=text=>{
    const sep=text.includes('\t')?'\t':',';
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length)return[];
    const rows=lines.map(l=>l.split(sep).map(c=>c.replace(/^"|"$/g,'').trim()));
    const hdr=rows[0];
    let col=hdr.findIndex(h=>/商品名|品名|name/i.test(h));
    if(col<0){const sc=hdr.map((_,i)=>rows.slice(1).filter(r=>r[i]&&isNaN(r[i])&&r[i].length>1).length);col=sc.indexOf(Math.max(...sc));}
    return[...new Set(rows.slice(1).map(r=>r[col]).filter(v=>v&&v.length>1))];
  };

  const handleFile=async f=>{
    setErr('');setFileName(f.name||'');setPhase('loading');
    try{
      if(f.name.toLowerCase().endsWith('.csv')||f.type==='text/csv'||f.type==='text/plain'){
        // BOM検出でエンコーディング判定
        const ab=await f.arrayBuffer();
        const bom=new Uint8Array(ab.slice(0,2));
        const enc=(bom[0]===0xFF&&bom[1]===0xFE)||(bom[0]===0xFE&&bom[1]===0xFF)?'utf-16':'utf-8';
        const text=new TextDecoder(enc).decode(ab);
        // 構造化CSV（カテゴリ1列あり）→ AIなしで自動判定
        const result=parseStructuredCSV(text);
        if(result&&result.drinks.length){setStructured(result);setPhase('confirm-structured');return;}
        // 非構造化 → AI分類
        const names=parseNames(text);
        if(!names.length)throw new Error('商品名の列が見つかりませんでした');
        if(!apiKey)throw new Error('APIキーを設定してください');
        const res=await callVision(apiKey,null,null,
`以下はレストランの商品名リストです。各商品がドリンク（飲み物）かフード（料理・コース）かを判定してください。JSONのみで返答：
{"items":[{"name":"商品名","isDrink":true},{"name":"料理名","isDrink":false}]}
商品リスト：\n${names.join('\n')}`
        );
        const parsed=JSON.parse(res.replace(/```json|```/g,'').trim());
        setCandidates(parsed.items||[]);setPhase('confirm');
      } else if(f.type==='application/pdf'){
        const b64=await toB64(f);
        const res=await callVision(apiKey,b64,'application/pdf',
`この商品マスター・価格表PDFから全商品名を抽出し、各商品がドリンク（飲み物）かフード（料理・コース）かを判定してください。JSONのみで返答：
{"items":[{"name":"商品名","isDrink":true},{"name":"料理名","isDrink":false}]}
ドリンク＝アルコール・ソフトドリンク・お茶・水など飲み物全般。フード＝料理・コース・食事。`
        );
        const parsed=JSON.parse(res.replace(/```json|```/g,'').trim());
        setCandidates(parsed.items||[]);setPhase('confirm');
      }
    }catch(e){setErr(e.message);setPhase('list');}
  };

  const toggleCandidate=name=>setCandidates(prev=>prev.map(c=>c.name===name?{...c,isDrink:!c.isDrink}:c));
  const confirmCandidates=()=>{
    const newDrinks=[...new Set([...master.drinks,...candidates.filter(c=>c.isDrink).map(c=>c.name)])];
    const newExcludes=[...new Set([...master.excludes,...candidates.filter(c=>!c.isDrink).map(c=>c.name)])];
    persist({...master,drinks:newDrinks,excludes:newExcludes});setCandidates([]);setPhase('list');setFileName('');
  };
  const confirmStructured=()=>{
    const newDrinks=[...new Set([...master.drinks,...structured.drinks.map(d=>d.name)])];
    const newExcludes=[...new Set([...master.excludes,...(structured.excludes||[])])];
    persist({...master,drinks:newDrinks,excludes:newExcludes});setStructured(null);setPhase('list');setFileName('');
  };

  /* ── 構造化CSV確認画面 ── */
  if(phase==='confirm-structured'&&structured){
    const byCat2={};
    structured.drinks.forEach(d=>{
      if(!byCat2[d.cat2])byCat2[d.cat2]={count:0,qty:0,amt:0};
      byCat2[d.cat2].count++;byCat2[d.cat2].qty+=d.qty;byCat2[d.cat2].amt+=d.amt;
    });
    return React.createElement('div',null,
      React.createElement('div',{className:'card'},
        React.createElement('div',{style:{fontSize:13,fontWeight:600,marginBottom:2,color:'var(--green)',display:'flex',alignItems:'center',gap:5}},
          React.createElement('i',{className:'ti ti-check-circle'}),'カテゴリ列から自動判定しました（AI不要）'
        ),
        React.createElement('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:12}},fileName),
        React.createElement('table',null,
          React.createElement('thead',null,React.createElement('tr',null,
            ['カテゴリ','品数','杯数','売上金額'].map(h=>React.createElement('th',{key:h},h))
          )),
          React.createElement('tbody',null,
            Object.entries(byCat2).map(([cat,v])=>React.createElement('tr',{key:cat},
              React.createElement('td',null,cat||'（未分類）'),
              React.createElement('td',null,`${v.count}品`),
              React.createElement('td',null,v.qty>0?`${v.qty.toLocaleString()}杯`:'-'),
              React.createElement('td',null,v.amt>0?`¥${v.amt.toLocaleString()}`:'-')
            ))
          )
        ),
        React.createElement('div',{style:{marginTop:10,padding:'10px 12px',background:'var(--surface2)',borderRadius:'var(--r)',fontSize:12,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:6}},
          React.createElement('span',{style:{fontWeight:600}},`ドリンク ${structured.drinks.length}品 / 除外（コース・フード）${(structured.excludes||[]).length}品`),
          structured.totalQty>0&&React.createElement('span',{style:{color:'var(--blue)',fontWeight:600}},
            `${structured.totalQty.toLocaleString()}杯 / ¥${structured.totalAmt.toLocaleString()}`)
        ),
        React.createElement('div',{style:{display:'flex',gap:8,marginTop:12}},
          React.createElement('button',{onClick:()=>{setStructured(null);setPhase('list')},style:{flex:1}},'← やり直し'),
          React.createElement('button',{onClick:confirmStructured,
            style:{flex:2,background:'var(--blue)',color:'#fff',border:'none',fontWeight:600,justifyContent:'center',padding:'10px',borderRadius:'var(--r)',display:'flex',alignItems:'center',gap:5,cursor:'pointer'}},
            React.createElement('i',{className:'ti ti-device-floppy'}),` ${structured.drinks.length}品をマスターに保存`)
        )
      )
    );
  }

  /* ── AI分類確認画面 ── */
  if(phase==='confirm') return React.createElement('div',null,
    React.createElement('div',{className:'card',style:{marginBottom:10}},
      React.createElement('div',{style:{fontSize:13,fontWeight:600,marginBottom:4}},
        React.createElement('i',{className:'ti ti-check-list',style:{marginRight:5}}),'AI分類結果を確認'
      ),
      React.createElement('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:12}},`${fileName} — タップで反転できます`),

/* ── Past Entry ── */
function PastEntry({apiKey,data,setData}){
  const fmtD=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const prevDay=d=>{const[y,m,day]=d.split('-').map(Number);return fmtD(new Date(y,m-1,day-1))};
  const nextDay=d=>{const[y,m,day]=d.split('-').map(Number);return fmtD(new Date(y,m-1,day+1))};
  const initDate=()=>{const dt=new Date();dt.setDate(dt.getDate()-1);return dt.toISOString().slice(0,10)};

  const [selDate,setSelDate]=useState(initDate);
  const [saved,setSaved]=useState(false);
  const [img,setImg]=useState(null);
  const [imgB64,setImgB64]=useState(null);
  const [mime,setMime]=useState('image/jpeg');
  const [fileName,setFileName]=useState('');
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState('');

  const existing=(data.days||[]).find(d=>d.date===selDate);

  const changeDate=d=>{
    setSelDate(d);setSaved(false);setImg(null);setImgB64(null);
    setResult(null);setErr('');setFileName('');
  };

  const analyze=async()=>{
    if(!imgB64)return;
    setLoading(true);setErr('');
    try{
      const text=await callVision(apiKey,imgB64,mime,
`これは飲食店の日次締め（Z）レポートまたは伝票ジャーナルです。JSONのみで返答（説明文不要）：
{"totalSales":総売上数値,"totalCovers":総客数数値,"drinkSales":ドリンク売上数値,"drinkCount":ドリンク総杯数数値,"foodSales":フード売上数値,"tableCount":組数数値,"lunchCovers":ランチ客数数値,"dinnerCovers":ディナー客数数値,"lunchDrinkSales":ランチドリンク売上数値,"dinnerDrinkSales":ディナードリンク売上数値,"notes":"特記事項（なければ空文字）","tables":[{"time":"HH:MM","seat":"席名","covers":人数数値,"course":"コース名","drinkTotal":ドリンク合計数値,"foodTotal":フード合計数値,"total":合計数値,"drinks":[{"name":"品名","qty":数量数値,"unitPrice":単価数値,"subtotal":小計数値}]}]}
伝票ジャーナル・明細表など個別テーブルの記録がある場合はtablesに各テーブルを抽出。drinksはアルコール・ソフトドリンク品目のみ（料理・コース料金は含めない）。timeは退店時間（HH:MM）。seatはテーブル番号・席名（例：T8、RURI）。ない場合はtables:[]。drinkCountはドリンク品目の数量合計。不明な値は0。`
      );
      setResult(JSON.parse(text.replace(/```json|```/g,'').trim()));
    }catch(e){setErr('解析エラー: '+e.message);}
    finally{setLoading(false);}
  };

  const doSave=d=>{
    const drinkSales=parseInt(d.drinkSales)||0;
    const covers=parseInt(d.totalCovers)||0;
    const totalSales=parseInt(d.totalSales)||0;
    const foodSales=parseInt(d.foodSales)||0;
    const tableCount=parseInt(d.tableCount)||0;
    const drinkCount=parseInt(d.drinkCount)||0;
    const rec={date:selDate,totalSales,totalCovers:covers,drinkSales,drinkCount,foodSales,tableCount,
      lunchCovers:parseInt(d.lunchCovers)||0,dinnerCovers:parseInt(d.dinnerCovers)||0,
      lunchDrinkSales:parseInt(d.lunchDrinkSales)||0,dinnerDrinkSales:parseInt(d.dinnerDrinkSales)||0,
      drinkPerCover:covers>0?drinkSales/covers:0,drinkRatio:totalSales>0?drinkSales/totalSales:0,
      closedAt:new Date().toISOString(),notes:d.notes||''};
    /* 伝票ジャーナルから個別テーブル記録を抽出してdata.tablesにも保存 */
    const extractedTables=(d.tables||[]).filter(t=>t.total>0||t.drinkTotal>0).map(t=>({
      id:uid(),date:selDate,
      time:t.time||'',seat:t.seat||'',covers:parseInt(t.covers)||0,
      course:t.course||'',
      drinks:t.drinks||[],
      drinkTotal:parseInt(t.drinkTotal)||0,
      foodTotal:parseInt(t.foodTotal)||0,
      total:parseInt(t.total)||0,
      drinkPerCover:(parseInt(t.covers)||0)>0?(parseInt(t.drinkTotal)||0)/(parseInt(t.covers)||0):0,
      drinksPerCover:(parseInt(t.covers)||0)>0?(t.drinks||[]).reduce((s,dd)=>s+(dd.qty||0),0)/(parseInt(t.covers)||0):0,
      savedAt:new Date().toISOString()
    }));
    setData(prev=>{
      const days=[...(prev.days||[]).filter(x=>x.date!==selDate),rec];
      const tables=extractedTables.length
        ?[...(prev.tables||[]).filter(t=>t.date!==selDate),...extractedTables]
        :(prev.tables||[]);
      return{...prev,days,tables};
    });
    setSaved(true);setImg(null);setImgB64(null);setResult(null);setFileName('');
  };

  const delDay=()=>{
    if(!confirm(`${selDate} のデータを削除しますか？`))return;
    setData(prev=>({...prev,days:(prev.days||[]).filter(x=>x.date!==selDate)}));
    setSaved(false);
  };

  const doneCount=(data.days||[]).length;
  const isFuture=selDate>=today();

  return React.createElement('div',null,
    /* 日付ナビ */
    React.createElement('div',{className:'card',style:{marginBottom:12}},
      React.createElement('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:8}},
        React.createElement('i',{className:'ti ti-calendar-stats',style:{marginRight:4}}),
        `登録済み ${doneCount}日分`
      ),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
        React.createElement('button',{onClick:()=>changeDate(prevDay(selDate)),style:{padding:'6px 10px',flexShrink:0}},
          React.createElement('i',{className:'ti ti-chevron-left'})
        ),
        React.createElement('input',{type:'date',value:selDate,max:prevDay(today()),
          onChange:e=>changeDate(e.target.value),
          style:{flex:1,textAlign:'center',fontWeight:700,fontSize:15}}),
        React.createElement('button',{onClick:()=>changeDate(nextDay(selDate)),disabled:nextDay(selDate)>=today(),style:{padding:'6px 10px',flexShrink:0}},
          React.createElement('i',{className:'ti ti-chevron-right'})
        )
      ),
      existing&&!saved&&React.createElement('div',{style:{marginTop:10,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 10px',background:'#fef3c7',borderRadius:'var(--r)',border:'0.5px solid #fcd34d'}},
        React.createElement('span',{style:{fontSize:12,color:'#92400e'}},
          React.createElement('i',{className:'ti ti-check-circle',style:{marginRight:4,color:'var(--green)'}}),
          `登録済み — ドリンク売上 ¥${fmt(existing.drinkSales)} / ${existing.totalCovers||0}名`
        ),
        React.createElement('button',{onClick:delDay,style:{padding:'3px 8px',fontSize:11,color:'var(--red)',borderColor:'#fca5a5',background:'#fee2e2',flexShrink:0}},
          React.createElement('i',{className:'ti ti-trash'}),' 削除'
        )
      )
    ),
    /* 保存後 */
    saved&&React.createElement('div',{className:'card',style:{background:'#f0fdf4',borderColor:'#86efac',marginBottom:12}},
      React.createElement('div',{style:{fontSize:14,fontWeight:700,color:'var(--green)',marginBottom:12}},
        React.createElement('i',{className:'ti ti-check',style:{marginRight:6}}),weekLabel(selDate),'のデータを保存しました'
      ),
      React.createElement('div',{style:{display:'flex',gap:8}},
        React.createElement('button',{
          onClick:()=>changeDate(prevDay(selDate)),
          style:{flex:2,background:'var(--blue)',color:'#fff',border:'none',fontWeight:600,justifyContent:'center',padding:'10px'}
        },React.createElement('i',{className:'ti ti-chevron-left'}),' 前の日へ'),
        React.createElement('button',{onClick:()=>setSaved(false),style:{flex:1,justifyContent:'center'}},'再スキャン')
      )
    ),
    /* スキャンUI */
    !saved&&!isFuture&&React.createElement('div',{className:'card'},
      React.createElement('div',{style:{fontSize:13,fontWeight:700,marginBottom:14,display:'flex',alignItems:'center',gap:6}},
        React.createElement('i',{className:'ti ti-camera',style:{color:'var(--blue)'}}),
        'Zレポート・伝票ジャーナルを撮影'
      ),
      !img&&React.createElement(UploadZone,{onFile:f=>{
        setErr('');setResult(null);setFileName(f.name||'');
        setImg(f.type==='application/pdf'?'__pdf__':URL.createObjectURL(f));
        compressImage(f).then(({b64,mime:m})=>{setImgB64(b64);setMime(m);}).catch(e=>setErr('読み込みエラー: '+e.message));
      },label:'レシート・ZレポートPDFを選択',hint:'カメラ撮影・PDF・画像どちらも対応'}),
      img&&React.createElement('div',null,
        img==='__pdf__'
          ?React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--surface)',borderRadius:'var(--r)',border:'0.5px solid var(--border)',marginBottom:8}},
              React.createElement('i',{className:'ti ti-file-type-pdf',style:{fontSize:24,color:'var(--red)',flexShrink:0}}),
              React.createElement('span',{style:{fontSize:12,fontWeight:600,wordBreak:'break-all'}},fileName))
          :React.createElement('img',{src:img,className:'receipt-img'}),
        !result&&React.createElement('div',{style:{display:'flex',gap:8,marginBottom:8}},
          React.createElement('button',{onClick:()=>{setImg(null);setImgB64(null);setFileName('');setErr('');},style:{flex:1}},
            React.createElement('i',{className:'ti ti-x'}),' やり直し'),
          React.createElement('button',{onClick:analyze,disabled:loading,style:{flex:2,background:'var(--blue)',color:'#fff',border:'none',fontWeight:600,justifyContent:'center'}},
            loading?[React.createElement('i',{key:'i',className:'ti ti-loader spin'}),' 解析中...']
                   :[React.createElement('i',{key:'i',className:'ti ti-sparkles'}),' AIで解析']
          )
        ),
        err&&React.createElement('div',{style:{color:'var(--red)',fontSize:12,padding:'8px 12px',background:'#fee2e2',borderRadius:'var(--r)',marginBottom:8}},err),
        result&&React.createElement('div',null,
          React.createElement('div',{style:{padding:'10px 12px',background:'#f0fdf4',borderRadius:'var(--r)',border:'0.5px solid #86efac',marginBottom:10}},
            React.createElement('div',{style:{fontSize:12,fontWeight:600,color:'var(--green)',marginBottom:8}},
              React.createElement('i',{className:'ti ti-check-circle',style:{marginRight:4}}),'解析完了'
            ),
            React.createElement('div',{className:'grid4'},
              [{l:'総売上',v:`¥${fmt(result.totalSales)}`},{l:'客数',v:`${result.totalCovers}名`},{l:'D売上',v:`¥${fmt(result.drinkSales)}`},{l:'D杯数',v:`${result.drinkCount||'?'}杯`}]
              .map(({l,v})=>React.createElement('div',{key:l,style:{textAlign:'center'}},
                React.createElement('div',{style:{fontSize:13,fontWeight:700}},v),
                React.createElement('div',{style:{fontSize:10,color:'var(--text2)'}},l)
                  ))
                )
              ),
              React.createElement('button',{
                onClick:()=>doSave(result),
                style:{background:'var(--green)',color:'#fff',border:'none',fontWeight:600,justifyContent:'center',width:'100%',padding:'12px',borderRadius:'var(--r)',display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:14}
              },React.createElement('i',{className:'ti ti-device-floppy'}),' このデータで保存する')
        )
      )
    ),
    isFuture&&React.createElement('div',{className:'empty'},
      React.createElement('i',{className:'ti ti-calendar-x'}),'未来の日付は登録できません'
    )
  );

/* ── Batch Import ── */
function BatchImport({apiKey,data,setData}){
  const [items,setItems]=useState([]);
  const [running,setRunning]=useState(false);
  const [mode,setMode]=useState('day');
  const [bulkDate,setBulkDate]=useState(today);
  const fileRef=useRef();

  const switchMode=m=>{if(running)return;setMode(m);setItems([]);};
  const applyBulkDate=()=>{
    if(!bulkDate)return;
    setItems(prev=>prev.map(x=>x.status==='done'&&!x.date?{...x,date:bulkDate}:x));
  };

  const addFiles=fl=>{
    const arr=Array.from(fl).filter(f=>f.type.startsWith('image/')||f.type==='application/pdf');
    if(!arr.length)return;
    setItems(prev=>[...prev,...arr.map(f=>({id:uid(),name:f.name,file:f,status:'waiting',results:null,result:null,err:'',date:''}))]);
  };
  const upd=(id,patch)=>setItems(prev=>prev.map(x=>x.id===id?{...x,...patch}:x));
  const updDayDate=(id,idx,date)=>setItems(prev=>prev.map(x=>{
    if(x.id!==id)return x;
    const results=[...(x.results||[])];results[idx]={...results[idx],date};return{...x,results};
  }));

  const getPrompt=()=>{
    if(mode==='day'){
      return `これは飲食店の日次締め（Z）レポートまたは日計レシートです。複数日分が含まれる場合はすべての日分を抽出してください。JSONのみで返答（説明文・コードブロック不要）：
[{"date":"YYYY-MM-DD","totalSales":総売上数値,"totalCovers":総客数数値,"drinkSales":ドリンク売上数値,"drinkCount":ドリンク総杯数数値,"foodSales":フード売上数値,"tableCount":組数数値,"lunchCovers":ランチ客数数値,"dinnerCovers":ディナー客数数値,"lunchDrinkSales":ランチドリンク売上数値,"dinnerDrinkSales":ディナードリンク売上数値,"notes":"特記事項（なければ空文字）","tables":[{"time":"HH:MM","seat":"席名","covers":人数数値,"course":"コース名","drinkTotal":ドリンク合計数値,"foodTotal":フード合計数値,"total":合計数値}]}]
必ず配列で返すこと（1日分でも配列）。日付はYYYY-MM-DD形式。伝票ジャーナル・明細表など個別テーブルの記録がある場合はtablesに各テーブルを抽出（drinks配列は不要）。timeは退店時間。seatはテーブル番号・席名。ない場合はtables:[]。drinkCountはドリンク品目の数量合計。不明な値は0。`;
    }
    const {drinks:masterDrinks,excludes:masterExcludes,seats:masterSeats}=loadMaster();
    const masterNote=masterDrinks.length?`\n【登録済みドリンク商品マスター】以下の品名は必ずdrinksに含める：\n${masterDrinks.join('、')}\nマスターにない品名は一般的な知識で判断する。`:'';
    const excludeNote=(masterExcludes&&masterExcludes.length)?`\n【除外リスト】以下の品名は絶対にdrinksに含めないこと（コース・フード商品）：\n${masterExcludes.join('、')}`:''
    const seatNote=(masterSeats&&masterSeats.length)?`\n【席マスター】レシートに席名・テーブル番号等があれば"seat"に記載。以下から最も近いものを選ぶ：\n${masterSeats.join('、')}\nなければ空文字。`:'\n【席】レシートに席名・テーブル番号等があれば"seat"に記載。なければ空文字。';
    return `このレストランのテーブルレシートを解析してください。JSONのみで返答（説明文・コードブロック不要）：
{"date":"YYYY-MM-DD","time":"HH:MM","covers":人数数値,"seat":"席名（テーブル番号・個室名等。不明は空文字）","course":"コース名（不明は空文字）","drinks":[{"name":"品名","qty":数量数値,"unitPrice":単価数値,"subtotal":小計数値}],"drinkTotal":ドリンク合計数値,"foodTotal":フード合計数値,"total":合計数値}
日付・時刻はレシートから読み取る（date: YYYY-MM-DD形式、time: HH:MM形式）。timeは必ず「退店時間」を使うこと（入店時間ではなく）。読み取れない場合は空文字""。
【drinksの列挙ルール】以下のいずれかに該当する品目のみdrinksに含める：
①アルコール類：生ビール・瓶ビール・ビール銘柄（例：白穂乃香・エビス・プレミアムモルツ等）、ワイン・シャンパン・スパークリング、日本酒・銘柄酒（例：獺祭・久保田等）、焼酎・泡盛、ウイスキー・ブランデー、カクテル・サワー・ハイボール、梅酒・リキュール、紹興酒・中国酒
②ソフトドリンク類：ジュース・コーラ・ウーロン茶・緑茶・水・ミネラルウォーター・コーヒー・ノンアルコール飲料
品名だけでは判断できない場合は単価・文脈から推測すること。料理・フード・コース料金・サービス料は絶対にdrinksに含めないこと。drinkTotalはdrinksの合計金額と一致させること。不明な金額は0。${excludeNote}${masterNote}${seatNote}`;
  };

  const processAll=async()=>{
    if(!apiKey){alert('APIキーを設定してください');return;}
    const snap=items.filter(i=>i.status==='waiting'||i.status==='error');
    if(!snap.length)return;
    setRunning(true);
    const prompt=getPrompt();
    for(let i=0;i<snap.length;i++){
      const item=snap[i];
      upd(item.id,{status:'processing',err:''});
      try{
        const{b64,mime}=await compressImage(item.file);
        if(mode==='day'){
          /* まずルールベースパーサーを試みる（AIなし・無料） */
          if(mime==='application/pdf'){
            upd(item.id,{status:'processing',err:'PDF解析中（AIなし）...'});
            let parseErr='';
            try{
              const {drinks:mD,excludes:mE}=loadMaster();
              const text=await extractPDFText(b64);
              const parsed=parseJournalText(text,mD,mE);
              if(parsed&&parsed.length){
                upd(item.id,{status:'done',results:parsed.map(d=>({...d,date:(d.date&&/^\d{4}-\d{2}-\d{2}$/.test(d.date))?d.date:''})),err:''});
                if(i<snap.length-1)await new Promise(r=>setTimeout(r,400));
                continue;
              }
              /* テキストは取れたが伝票形式でなかった場合 */
              const hasDate=text.includes('営業日付')||text.includes('営業日');
              const hasTicket=text.includes('伝票')||text.includes('テーブル');
              const preview=text.slice(0,200).replace(/\n/g,'↵');
              parseErr=hasDate&&hasTicket
                ?'伝票の形式が読み取れませんでした（APIで再解析するにはクレジットが必要）'
                :`[デバッグ] PDF先頭200文字: ${preview||'(空)'}`;
            }catch(pe){
              parseErr='PDF読み込みエラー: '+pe.message;
            }
            /* ルールベース失敗 → APIには回さずエラー表示 */
            upd(item.id,{status:'error',err:parseErr||'伝票ジャーナル形式を認識できませんでした'});
            continue;
          }
          /* Step1: サマリー抽出（軽量・高速） */
          const summaryPrompt=`これは飲食店の日次締め（Z）レポートまたは伝票ジャーナルです。JSONのみで返答（説明文不要）：
[{"date":"YYYY-MM-DD","totalSales":総売上数値,"totalCovers":総客数数値,"drinkSales":ドリンク売上数値,"drinkCount":ドリンク総杯数数値,"foodSales":フード売上数値,"tableCount":組数数値,"lunchCovers":ランチ客数数値,"dinnerCovers":ディナー客数数値,"lunchDrinkSales":ランチドリンク売上数値,"dinnerDrinkSales":ディナードリンク売上数値,"notes":"特記事項（なければ空文字）"}]
必ず配列で返すこと。日付はYYYY-MM-DD形式。drinkCountはドリンク品目の数量合計。ランチ（〜16:59）/ディナー（17:00〜）別データがあれば抽出。不明な値は0。`;
          const text1=await callVision(apiKey,b64,mime,summaryPrompt,4096);
          const arr=(Array.isArray(JSON.parse(text1.replace(/```json|```/g,'').trim()))?JSON.parse(text1.replace(/```json|```/g,'').trim()):[JSON.parse(text1.replace(/```json|```/g,'').trim())]).map(d=>({...d,date:(d.date&&/^\d{4}-\d{2}-\d{2}$/.test(d.date))?d.date:''}));
          upd(item.id,{status:'processing',results:arr,err:'テーブル明細を抽出中...'});
          /* Step2: テーブル明細抽出（日付ごとに分割して要求） */
          const dates=[...new Set(arr.map(d=>d.date).filter(Boolean))];
          let allTables=[];
          for(const date of dates){
            try{
              const tablePrompt=`この伝票ジャーナルから ${date} 分のテーブル明細のみをJSON配列で返答（説明文不要）：
[{"time":"HH:MM","seat":"席名またはテーブル番号","covers":人数数値,"course":"コース名","drinkTotal":ドリンク合計数値,"foodTotal":フード合計数値,"total":合計数値,"drinks":[{"name":"品名","qty":数量数値,"unitPrice":単価数値,"subtotal":小計数値}]}]
timeは退店時間。seatはテーブル番号・個室名（例: T8、RURI）。drinksはアルコール・ソフトドリンク品目のみ（料理・コース料金は含めない）。${date}以外の日付は含めないこと。不明な値は0。`;
              const text2=await callVision(apiKey,b64,mime,tablePrompt,8192);
              const tables=JSON.parse(text2.replace(/```json|```/g,'').trim());
              if(Array.isArray(tables))allTables=[...allTables,...tables.map(t=>({...t,date}))];
            }catch(te){console.warn('table extract failed for',date,te.message);}
            await new Promise(r=>setTimeout(r,600));
          }
          upd(item.id,{status:'done',results:arr.map(d=>({...d,tables:allTables.filter(t=>t.date===d.date)})),err:''});
        }else{
          const text=await callVision(apiKey,b64,mime,prompt,2000);
          const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
          const dateStr=(parsed.date&&/^\d{4}-\d{2}-\d{2}$/.test(parsed.date))?parsed.date:'';
          parsed.drinkPerCover=parsed.covers>0?parsed.drinkTotal/parsed.covers:0;
          parsed.drinksPerCover=parsed.covers>0?(parsed.drinks||[]).reduce((s,d)=>s+(d.qty||0),0)/parsed.covers:0;
          upd(item.id,{status:'done',result:parsed,date:dateStr});
        }
      }catch(e){
        const msg=e.message.includes('100 PDF pages')
          ?'PDFが100ページを超えています。ファイルを分割してください。'
          :e.message.includes('too long')||e.message.includes('tokens')
          ?'ファイルが大きすぎます。'+(mode==='day'?'週単位程度に分割してください（目安：8MB以内）。':'1テーブル分のレシートを1枚ずつアップロードしてください。')
          :e.message;
        upd(item.id,{status:'error',err:msg});
      }
      if(i<snap.length-1)await new Promise(r=>setTimeout(r,1200));
    }
    setRunning(false);
  };

  const saveAll=()=>{
    if(mode==='day'){
      const allDays=items.filter(i=>i.status==='done').flatMap(i=>(i.results||[]).filter(d=>d.date).map(d=>{
        const totalSales=parseInt(d.totalSales)||0,drinkSales=parseInt(d.drinkSales)||0,covers=parseInt(d.totalCovers)||0;
        return{date:d.date,totalSales,totalCovers:covers,drinkSales,drinkCount:parseInt(d.drinkCount)||0,
          foodSales:parseInt(d.foodSales)||0,tableCount:parseInt(d.tableCount)||0,
          lunchCovers:parseInt(d.lunchCovers)||0,dinnerCovers:parseInt(d.dinnerCovers)||0,
          lunchDrinkSales:parseInt(d.lunchDrinkSales)||0,dinnerDrinkSales:parseInt(d.dinnerDrinkSales)||0,
          notes:d.notes||'',drinkPerCover:covers>0?drinkSales/covers:0,drinkRatio:totalSales>0?drinkSales/totalSales:0,
          closedAt:new Date().toISOString(),
          _tables:(d.tables||[]).filter(t=>t.total>0||t.drinkTotal>0)};
      }));
      if(!allDays.length){alert('日付が設定されたデータがありません');return;}
      setData(prev=>{
        const days=[...(prev.days||[])];
        let tables=[...(prev.tables||[])];
        allDays.forEach(nd=>{
          const{_tables,...dayRec}=nd;
          const idx=days.findIndex(d=>d.date===dayRec.date);
          if(idx>=0)days[idx]=dayRec;else days.push(dayRec);
          if(_tables&&_tables.length){
            tables=tables.filter(t=>t.date!==dayRec.date);
            _tables.forEach(t=>tables.push({
              id:uid(),date:dayRec.date,
              time:t.time||'',seat:t.seat||'',covers:parseInt(t.covers)||0,
              course:t.course||'',drinks:t.drinks||[],
              drinkTotal:parseInt(t.drinkTotal)||0,foodTotal:parseInt(t.foodTotal)||0,
              total:parseInt(t.total)||0,
              drinkPerCover:(parseInt(t.covers)||0)>0?(parseInt(t.drinkTotal)||0)/(parseInt(t.covers)||0):0,
              savedAt:new Date().toISOString()
            }));
          }
        });
        return{...prev,days:days.sort((a,b)=>a.date.localeCompare(b.date)),tables};
      });
      setItems(prev=>prev.filter(i=>i.status!=='done'));
      alert(`${allDays.length}日分のデータを保存しました`);
    }else{
      const done=items.filter(i=>i.status==='done'&&i.result).map(item=>({
        ...item,date:item.date||bulkDate /* 日付未設定は一括日付で補完 */
      })).filter(item=>item.date);
      if(!done.length){alert('日付が設定されていません。上の「一括日付」欄に日付を入力してください');return;}
      const timeFromResult=r=>{
        /* AIが time を返してくれる場合はそれを使う */
        if(r.time&&/^\d{2}:\d{2}$/.test(r.time))return r.time;
        return'00:00';
      };
      setData(prev=>({...prev,tables:[...(prev.tables||[]),...done.map(item=>({
        id:uid(),date:item.date,time:timeFromResult(item.result),covers:item.result.covers||0,
        course:item.result.course||'',seat:item.result.seat||'',
        drinks:item.result.drinks||[],drinkTotal:item.result.drinkTotal||0,foodTotal:item.result.foodTotal||0,
        total:item.result.total||0,drinkPerCover:item.result.drinkPerCover||0,
        drinksPerCover:item.result.drinksPerCover||0,savedAt:new Date().toISOString()
      }))]}));
      setItems(prev=>prev.filter(i=>i.status!=='done'));
      const savedDates=[...new Set(done.map(i=>i.date))].sort();
      const dateRange=savedDates.length===1?savedDates[0]:`${savedDates[0]} 〜 ${savedDates[savedDates.length-1]}`;
      alert(`${done.length}件のテーブルデータを保存しました（${dateRange}）\n\nレポート→週次・月次の「日別一覧」に反映されます。`);
    }
  };

  const doneCount=items.filter(i=>i.status==='done').length;
  const doneWithDate=mode==='day'
    ?items.filter(i=>i.status==='done').reduce((s,i)=>s+(i.results||[]).filter(d=>d.date).length,0)
    :items.filter(i=>i.status==='done'&&i.result).length; /* 日付不問で件数カウント */
  const noDateCount=mode==='table'?items.filter(i=>i.status==='done'&&i.result&&!i.date).length:0;
  const errCount=items.filter(i=>i.status==='error').length;
  const waitCount=items.filter(i=>i.status==='waiting').length;

  const modeInfo=mode==='day'
    ?{title:'日次Zレポート一括登録',desc:'週単位・月単位のZレポートPDFをまとめてアップロードできます。複数日が含まれるPDFは自動で日ごとに分割して抽出します。例：「5月1w.pdf」なら7日分を一度に登録。',hint:'1ファイル = 1日〜週単位のZレポート（画像・PDF）'}
    :{title:'テーブルレシート一括登録',desc:'テーブルごとのレシートを複数まとめて解析・登録できます。日付はレシートから自動抽出します。',hint:'1ファイル = テーブル1組分のレシート（画像・PDF）'};

  return React.createElement('div',null,
    /* Mode switcher */
    React.createElement('div',{className:'seg-ctrl',style:{marginBottom:10}},
      ['day','table'].map(m=>React.createElement('button',{key:m,
        className:`seg-btn${mode===m?' active':''}`,onClick:()=>switchMode(m)},
        m==='day'?[React.createElement('i',{key:'i',className:'ti ti-calendar-stats'}),' 日次Zレポート']
                 :[React.createElement('i',{key:'i',className:'ti ti-receipt'}),' テーブルレシート']
      ))
    ),
    /* Info card */
    React.createElement('div',{className:'card',style:{marginBottom:10,background:'#eff3ff',border:'0.5px solid #a5b4fc'}},
      React.createElement('div',{style:{fontSize:13,fontWeight:600,marginBottom:4,color:'var(--blue)'}},
        React.createElement('i',{className:'ti ti-info-circle',style:{marginRight:5}}),modeInfo.title),
      React.createElement('div',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.7}},modeInfo.desc)
    ),
    /* テーブルモード：一括日付設定 */
    mode==='table'&&React.createElement('div',{className:'card',style:{marginBottom:10,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}},
      React.createElement('div',{style:{fontSize:12,fontWeight:600,color:'var(--text1)',flexShrink:0}},
        React.createElement('i',{className:'ti ti-calendar',style:{marginRight:4}}),'一括日付'
      ),
      React.createElement('input',{type:'date',value:bulkDate,max:today(),onChange:e=>setBulkDate(e.target.value),
        style:{fontSize:13,padding:'4px 8px',flex:1,minWidth:120}}),
      React.createElement('button',{onClick:applyBulkDate,
        style:{padding:'5px 10px',fontSize:12,background:'var(--surface2)',border:'0.5px solid var(--border2)',borderRadius:'var(--r)',cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}},
        '日付未設定に適用'),
      React.createElement('div',{style:{fontSize:11,color:'var(--text3)',width:'100%'}},
        'レシートから日付を読み取れない場合にここで指定した日付が使われます'
      )
    ),
    /* Control bar */
    items.length>0&&React.createElement('div',{className:'card',style:{marginBottom:10}},
      React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:8,alignItems:'center',justifyContent:'space-between'}},
        React.createElement('div',{style:{fontSize:12,color:'var(--text2)'}},
          mode==='day'
            ?`${items.length}ファイル | ✓完了${doneCount}(${doneWithDate}日分) ⌛待機${waitCount} ✗エラー${errCount}`
            :`${items.length}枚 | ✓完了${doneCount}${noDateCount>0?`(日付未設定${noDateCount}件)`:''} ⌛待機${waitCount} ✗エラー${errCount}`
        ),
        React.createElement('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
          !running&&(waitCount>0||errCount>0)&&React.createElement('button',{onClick:processAll,
            style:{background:'var(--blue)',color:'#fff',border:'none',padding:'7px 12px',borderRadius:'var(--r)',fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:5,fontSize:13}},
            React.createElement('i',{className:'ti ti-sparkles'}),' 解析開始'
          ),
          running&&React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'var(--blue)',padding:'7px 0'}},
            React.createElement('i',{className:'ti ti-loader spin'}),' 解析中...'
          ),
          doneCount>0&&!running&&React.createElement('button',{onClick:saveAll,
            style:{background:'var(--green)',color:'#fff',border:'none',padding:'7px 12px',borderRadius:'var(--r)',fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:5,fontSize:13}},
            React.createElement('i',{className:'ti ti-device-floppy'}),
            mode==='day'
              ?` 保存（${doneWithDate}日分）`
              :noDateCount>0?` 保存（${doneCount}件・日付未設定${noDateCount}件は一括日付で補完）`:` 保存（${doneCount}件）`
          ),
          !running&&React.createElement('button',{onClick:()=>setItems([]),
            style:{padding:'6px 10px',borderRadius:'var(--r)',border:'0.5px solid var(--border2)',cursor:'pointer',fontSize:12,color:'var(--text2)'}},
            'クリア'
          )
        )
      )
    ),
    /* Upload zone */
    React.createElement('div',{className:'upload-zone',style:{marginBottom:10,cursor:'pointer'},
      onClick:()=>fileRef.current.click(),
      onDragOver:e=>e.preventDefault(),
      onDrop:e=>{e.preventDefault();addFiles(e.dataTransfer.files)}
    },
      React.createElement('input',{ref:fileRef,type:'file',accept:'image/*,.pdf',multiple:true,style:{display:'none'},
        onChange:e=>{addFiles(e.target.files);e.target.value=''}}),
      React.createElement('i',{className:mode==='day'?'ti ti-calendar-plus':'ti ti-files',style:{fontSize:32,color:'var(--text3)',display:'block',marginBottom:6}}),
      React.createElement('div',{style:{fontSize:14,fontWeight:600,color:'var(--text2)'}},
        items.length?`さらに追加 / 現在 ${items.length}件`:'ファイルを複数まとめて選択'
      ),
      React.createElement('div',{style:{fontSize:11,color:'var(--text3)',marginTop:4}},modeInfo.hint,' | タップして複数選択 / ドラッグ＆ドロップ')
    ),
    /* Item list */
    items.length>0&&React.createElement('div',null,
      items.map(item=>React.createElement('div',{key:item.id,
        style:{display:'flex',gap:8,padding:'9px 12px',marginBottom:6,background:'var(--surface)',
          border:`1px solid ${item.status==='error'?'#fca5a5':item.status==='done'?'#86efac':'var(--border)'}`,
          borderRadius:'var(--r)',alignItems:'flex-start'}},
        React.createElement('div',{style:{fontSize:15,flexShrink:0,marginTop:2,
          color:item.status==='done'?'var(--green)':item.status==='error'?'var(--red)':item.status==='processing'?'var(--blue)':'var(--text3)'}},
          item.status==='processing'?React.createElement('i',{className:'ti ti-loader spin',style:{fontSize:14}})
          :item.status==='done'?React.createElement('i',{className:'ti ti-check'})
          :item.status==='error'?React.createElement('i',{className:'ti ti-x'})
          :React.createElement('i',{className:'ti ti-clock'})
        ),

/* ── Sheets共通ユーティリティ ── */
const GAS_URL_KEY='drink_tracker_gas_url';
const DEFAULT_GAS_URL='https://script.google.com/macros/s/AKfycbxXTAwVFp95QcBYFYt1-sjMRH9sCacB0AVFbnkexy11obPOATURpilTV1VbBHyT0d8x/exec';

/* GASから返ってくる日付・時刻をアプリの形式に変換 */
const sheetsToDate=v=>{
  if(!v)return'';
  const s=String(v).replace(/\//g,'-');
  if(/^\d{5}$/.test(s)){const d=new Date((parseInt(s)-25569)*86400000);return d.toISOString().slice(0,10);}
  if(s.includes('T')){const d=new Date(s);if(!isNaN(d))return d.toLocaleDateString('sv-SE');}
  return s.slice(0,10);
};
const sheetsToTime=v=>{
  if(!v)return'';
  const s=String(v);
  if(/^\d{1,2}:\d{2}/.test(s))return s.slice(0,5).padStart(5,'0');
  if(s.includes('T')){
    const d=new Date(s);
    if(!isNaN(d))return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
  const n=parseFloat(s);
  if(!isNaN(n)&&n>=0&&n<1){const tot=Math.round(n*1440);return`${String(Math.floor(tot/60)).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;}
  return'';
};
function convertSheetsRows(rows){
  if(!Array.isArray(rows))return[];
  return rows.filter(r=>r['合計']>0||r['D売上']>0).map(r=>({
    id:uid(),
    date:sheetsToDate(r['日付']),
    time:sheetsToTime(r['退店時間']),
    seat:String(r['席']||''),
    covers:parseInt(r['客数'])||0,
    course:String(r['コース']||''),
    drinks:[],
    drinkTotal:parseInt(r['D売上'])||0,
    foodTotal:parseInt(r['F売上'])||0,
    total:parseInt(r['合計'])||0,
    drinkPerCover:parseInt(r['1人D売上'])||0,
    drinkCount:parseInt(r['D杯数'])||0,
    drinksPerCover:parseInt(r['客数'])>0?(parseInt(r['D杯数'])||0)/(parseInt(r['客数'])||1):0,
    savedAt:new Date().toISOString()
  })).filter(r=>r.date);
}
function applyImport(imported,setData){
  if(!imported.length)return 0;
  const existingDates=new Set(imported.map(r=>r.date));
  setData(prev=>({...prev,tables:[...(prev.tables||[]).filter(t=>!existingDates.has(t.date)),...imported]}));
  return imported.length;
}

/* テーブルレコード1件をGAS Web AppにPOST（fire-and-forget）*/
async function postTableToGas(rec){
  const gasUrl=localStorage.getItem(GAS_URL_KEY)||DEFAULT_GAS_URL;
  if(!gasUrl)return;
  try{
    await fetch(gasUrl,{
      method:'POST',
      mode:'no-cors',/* CORSプリフライト回避 */
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(rec)
    });
  }catch(e){/* 失敗は無視。次の自動取り込みで整合 */}
}

/* ── Sheets Import ── */
function SheetsImport({data,setData,autoStatus}){
  const [url,setUrl]=useState(()=>localStorage.getItem(GAS_URL_KEY)||DEFAULT_GAS_URL);
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');

  const saveUrl=v=>{setUrl(v);localStorage.setItem(GAS_URL_KEY,v);};

  const doImport=async()=>{
    if(!url){setErr('URLを入力してください');return;}
    setLoading(true);setMsg('');setErr('');
    try{
      const res=await fetch(url);
      if(!res.ok)throw new Error('HTTP '+res.status);
      const rows=await res.json();
      if(!Array.isArray(rows))throw new Error('データ形式が正しくありません');
      const imported=convertSheetsRows(rows);
      if(!imported.length)throw new Error('インポートできるデータがありませんでした');
      const cnt=applyImport(imported,setData);
      const dates=new Set(imported.map(r=>r.date));
      setMsg(`✓ ${cnt}件をインポートしました（${dates.size}日分）`);
    }catch(e){setErr('エラー: '+e.message);}
    finally{setLoading(false);}
  };

  return React.createElement('div',{className:'card',style:{marginTop:16,background:'#f0f7ff',border:'0.5px solid #93c5fd'}},
    React.createElement('div',{style:{fontSize:13,fontWeight:700,marginBottom:10,color:'#1e40af'}},
      React.createElement('i',{className:'ti ti-brand-google',style:{marginRight:6}}),'Google Sheetsからインポート'
    ),
    React.createElement('div',{style:{fontSize:12,color:'var(--text2)',marginBottom:10}},
      'GASのウェブアプリURLを設定するとSheetsのデータをレポートに取り込めます'
    ),
    React.createElement('div',{style:{display:'flex',gap:8,marginBottom:8}},
      React.createElement('input',{
        type:'text',value:url,
        onChange:e=>saveUrl(e.target.value),
        placeholder:'https://script.google.com/macros/s/...',
        style:{flex:1,fontSize:12}
      }),
      React.createElement('button',{
        onClick:doImport,disabled:loading||!url,
        style:{flexShrink:0,background:'#1d4ed8',color:'#fff',border:'none',fontWeight:600,padding:'8px 14px',borderRadius:'var(--r)',cursor:'pointer',whiteSpace:'nowrap'}
      },loading?React.createElement('i',{className:'ti ti-loader spin'}):'取り込む')
    ),
    msg&&React.createElement('div',{style:{fontSize:12,color:'var(--green)',padding:'6px 10px',background:'#f0fdf4',borderRadius:'var(--r)'}},msg),
    err&&React.createElement('div',{style:{fontSize:12,color:'var(--red)',padding:'6px 10px',background:'#fee2e2',borderRadius:'var(--r)'}},err)
  );
}

/* ── TableManager（テーブルデータ個別削除） ── */
function TableManager({data,setData}){
  const [open,setOpen]=useState(false);
  const [confirmAll,setConfirmAll]=useState('');
  const tables=data.tables||[];
  /* 日付別グループ */
  const byDate=useMemo(()=>{
    const m={};
    tables.forEach(t=>{
      if(!m[t.date])m[t.date]=[];
      m[t.date].push(t);
    });
    return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));
  },[tables]);

  const delById=id=>setData(prev=>({...prev,tables:(prev.tables||[]).filter(t=>t.id!==id)}));
  const delByDate=date=>{
    if(!window.confirm(`${date} のテーブルデータ（${byDate.find(([d])=>d===date)?.[1]?.length||0}件）を削除しますか？`))return;
    setData(prev=>({...prev,tables:(prev.tables||[]).filter(t=>t.date!==date)}));
  };
  const delAll=()=>{
    if(confirmAll!=='削除')return;
    setData(prev=>({...prev,tables:[]}));
    setConfirmAll('');
  };

  if(!tables.length)return React.createElement('div',{className:'card',style:{marginTop:16}},
    React.createElement('div',{style:{fontSize:13,fontWeight:700,marginBottom:6}},
      React.createElement('i',{className:'ti ti-table',style:{marginRight:6}}),'テーブルレシート管理'
    ),
    React.createElement('div',{style:{fontSize:12,color:'var(--text3)',textAlign:'center',padding:'12px 0'}},'データがありません')
  );

  return React.createElement('div',{className:'card',style:{marginTop:16}},
    React.createElement('button',{
      onClick:()=>setOpen(p=>!p),
      style:{width:'100%',background:'none',border:'none',padding:0,display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',fontWeight:700,fontSize:13}
    },
      React.createElement('span',null,
        React.createElement('i',{className:'ti ti-table',style:{marginRight:6}}),
        `テーブルレシート管理（${tables.length}件・${byDate.length}日分）`
      ),
      React.createElement('i',{className:`ti ti-chevron-${open?'up':'down'}`,style:{color:'var(--text3)'}})
    ),
    open&&React.createElement('div',{style:{marginTop:12}},
      /* 日付別リスト */
      byDate.map(([date,rows])=>React.createElement('div',{key:date,style:{marginBottom:10,border:'0.5px solid var(--border)',borderRadius:'var(--r)',overflow:'hidden'}},
        /* 日付ヘッダー */
        React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 10px',background:'var(--surface2)',borderBottom:'0.5px solid var(--border)'}},
          React.createElement('span',{style:{fontSize:12,fontWeight:700}},`${date}（${rows.length}組）`),
          React.createElement('button',{
            onClick:()=>delByDate(date),
            style:{fontSize:11,padding:'2px 8px',color:'var(--red)',background:'#fee2e2',border:'0.5px solid #fca5a5',borderRadius:4,cursor:'pointer'}
          },'この日を削除')
        ),
        /* テーブル行 */
        rows.map(t=>React.createElement('div',{key:t.id,style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 10px',borderBottom:'0.5px solid var(--border)',fontSize:12}},
          React.createElement('div',null,
            React.createElement('span',{style:{fontWeight:600,marginRight:8}},t.seat||'—'),
            React.createElement('span',{style:{color:'var(--text2)',marginRight:8}},t.time||''),
            React.createElement('span',null,`${t.covers||0}名`),
            t.drinkTotal>0&&React.createElement('span',{style:{color:'var(--blue)',marginLeft:8}},`D¥${fmt(t.drinkTotal)}`),
            t.drinkCount>0&&React.createElement('span',{style:{color:'var(--text2)',marginLeft:6}},`${t.drinkCount}杯`)
          ),
          React.createElement('button',{
            onClick:()=>delById(t.id),
            style:{fontSize:11,padding:'2px 6px',color:'var(--red)',background:'none',border:'0.5px solid #fca5a5',borderRadius:4,cursor:'pointer'}
          },'×')
        ))
      )),
      /* 全件削除（要入力確認） */
      React.createElement('div',{style:{marginTop:12,padding:'10px 12px',background:'#fff5f5',border:'0.5px solid #fca5a5',borderRadius:'var(--r)'}},
        React.createElement('div',{style:{fontSize:12,fontWeight:700,color:'var(--red)',marginBottom:6}},
          React.createElement('i',{className:'ti ti-alert-triangle',style:{marginRight:4}}),'全件削除'
        ),
        React.createElement('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:8}},
          `「削除」と入力して実行すると全${tables.length}件が削除されます（復元不可）`
        ),
        React.createElement('div',{style:{display:'flex',gap:8}},
          React.createElement('input',{
            type:'text',value:confirmAll,onChange:e=>setConfirmAll(e.target.value),
            placeholder:'削除　と入力',
            style:{flex:1,fontSize:12}
          }),
          React.createElement('button',{
            onClick:delAll,disabled:confirmAll!=='削除',
            style:{padding:'6px 12px',background:confirmAll==='削除'?'var(--red)':'#e5e7eb',color:confirmAll==='削除'?'#fff':'var(--text3)',border:'none',borderRadius:'var(--r)',cursor:confirmAll==='削除'?'pointer':'not-allowed',fontWeight:600,fontSize:12,flexShrink:0}
          },'全件削除')
        )
      )
    )
  );
}

/* ── App ── */
function App(){
  const [data,setData]=useState(loadData);
  const [apiKey,setApiKey]=useState(loadKey);
  const [tab,setTab]=useState('today');
  const [goal,setGoal]=useState(loadGoal);
  const [config,setConfigState]=useState(loadConfig);
  const [autoMsg,setAutoMsg]=useState('');
  const setConfig=c=>{saveConfig(c);setConfigState(c);};
  useEffect(()=>{saveData(data)},[data]);
  /* 起動時にGAS URLが設定済みならバックグラウンドで自動インポート */
  useEffect(()=>{
    const gasUrl=localStorage.getItem(GAS_URL_KEY)||DEFAULT_GAS_URL;
    if(!gasUrl)return;
    setAutoMsg('sync');
    fetch(gasUrl)
      .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(rows=>{
        const imported=convertSheetsRows(rows);
        if(!imported.length){setAutoMsg('');return;}
        applyImport(imported,setData);
        setAutoMsg(`✓ ${imported.length}件 更新`);
        setTimeout(()=>setAutoMsg(''),4000);
      })
      .catch(()=>setAutoMsg(''));/* 失敗は無視 */
  },[]);
  const tabs=[{id:'today',label:'今日',icon:'ti-home'},{id:'reports',label:'レポート',icon:'ti-chart-bar'},{id:'past',label:'過去入力',icon:'ti-calendar-plus'},{id:'settings',label:'設定',icon:'ti-settings'}];
  return React.createElement('div',null,
    React.createElement(ApiBar,{apiKey,setApiKey}),
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}},
      React.createElement('div',null,
        React.createElement('h1',{style:{fontSize:19,fontWeight:700,letterSpacing:'-0.02em',display:'flex',alignItems:'center',gap:7}},
          React.createElement('i',{className:'ti ti-glass-full',style:{fontSize:20,color:'var(--blue)'}}),
          'ドリンク売上トラッカー'
        ),
        React.createElement('p',{style:{fontSize:11,color:'var(--text3)',marginTop:2}},(()=>{
          const zDays=(data.days||[]).length;
          const tDates=new Set((data.tables||[]).map(t=>t.date));
          (data.days||[]).forEach(d=>tDates.delete(d.date));
          const tOnlyDays=tDates.size;
          if(tOnlyDays>0)return`累計 ${zDays}日分のデータ（+テーブルのみ${tOnlyDays}日）`;
          return`累計 ${zDays}日分のデータ`;
        })())
      ),
      /* 自動インポートステータス */
      autoMsg&&React.createElement('div',{style:{fontSize:11,display:'flex',alignItems:'center',gap:5,color:autoMsg==='sync'?'var(--text3)':'var(--green)',padding:'4px 8px',background:autoMsg==='sync'?'var(--surface2)':'#f0fdf4',borderRadius:20,border:'0.5px solid',borderColor:autoMsg==='sync'?'var(--border)':'#86efac'}},
        autoMsg==='sync'
          ?[React.createElement('i',{key:'i',className:'ti ti-loader spin',style:{fontSize:12}}),'Sheets同期中...']
          :[React.createElement('i',{key:'i',className:'ti ti-cloud-check',style:{fontSize:12}}),autoMsg]
      )
    ),
    React.createElement('div',{className:'nav-tabs'},
      tabs.map(t=>React.createElement('button',{key:t.id,className:`nav-tab${tab===t.id?' active':''}`,onClick:()=>setTab(t.id)},
        React.createElement('i',{className:`ti ${t.icon}`,style:{fontSize:14}}),t.label
      ))
    ),
    tab==='today'&&React.createElement(TodayScreen,{apiKey,data,setData,goal,setGoal}),
    tab==='reports'&&React.createElement(Reports,{data,setData,goal,config}),
    tab==='past'&&React.createElement(PastEntry,{apiKey,data,setData}),
    tab==='settings'&&React.createElement('div',null,
      React.createElement(MasterSettings,{apiKey,config,setConfig}),
      /* Google Sheetsインポート */

          React.createElement('i',{className:'ti ti-database-export',style:{marginRight:6}}),'データバックアップ・復元'

        ),

                };
                reader.readAsText(f);
                e.target.value='';
              }
            })
          )
        )
      )
    )
  );
}
